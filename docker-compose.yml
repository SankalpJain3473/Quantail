version: "3.9"

# ── Quantail Full Stack ────────────────────────────────────────────────────
# Production-ready docker-compose with:
#   - FastAPI backend (Python)
#   - React frontend (Nginx)
#   - Redis for session caching
#   - Nginx reverse proxy with SSL termination
#
# Usage:
#   Development:  docker-compose up
#   Production:   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  # ── Backend: FastAPI ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: quantail-backend
    restart: unless-stopped
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - QUANTAIL_SECRET_KEY=${QUANTAIL_SECRET_KEY:-dev-secret-change-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:80}
      - POLYGON_API_KEY=${POLYGON_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - quantail-net
    volumes:
      - ./logs:/app/logs

  # ── Frontend: React + Nginx ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
        - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8000/ws/trading}
    container_name: quantail-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - quantail-net

  # ── Redis: Session cache ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quantail-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantail-net

networks:
  quantail-net:
    driver: bridge

volumes:
  redis-data:
    driver: local
